<div class="layout">

  <!-- IZQUIERDA -->
  <div class="izquierda">
    <h1>Quién Soy</h1>

    <p>Hola, soy Tobías Perea.</p>
    <p>Estoy desarrollando una sala de juegos como TP.</p>
  </div>

  <!-- CENTRO (perfil) -->
  <div class="centro" *ngIf="usuario$ | async as usuario">

    <h2>{{ usuario.login }}</h2>

    <img [src]="usuario.avatar_url">

    <p>{{ usuario.bio || 'Sin biografía' }}</p>

    <p>Repos: {{ usuario.public_repos }}</p>

    <button (click)="irAGithub(usuario.html_url)">
      Ver GitHub
    </button>

  </div>

</div>
